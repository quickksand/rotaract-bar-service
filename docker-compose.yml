services:
  asf-mongo:
    image: mongo:latest
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  asf-postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: rotaract_bar
      POSTGRES_USER: baruser
      POSTGRES_PASSWORD: sichael
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  mongo-data:
  postgres-data: