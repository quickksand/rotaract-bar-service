openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
servers:
  - url: http://localhost:8080
    description: Generated server url
paths:
  /api/orders:
    get:
      tags:
        - purchase-order-controller
      summary: Get all ordered items by item name
      description: This endpoint gets all currently saved ordereditems by item name
      operationId: getOrders
      parameters:
        - name: itemName
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PurchaseOrder"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PurchaseOrder"
        "400":
          description: Bad request - Invalid name provided
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderedItem"
    post:
      tags:
        - purchase-order-controller
      summary: Create new Order
      description: This endpoint creates a new purchase order
      operationId: createOrder
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseOrder"
        required: true
      responses:
        "200":
          description: Successful
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PurchaseOrder"
        "400":
          description: Bad request - Invalid details provided
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PurchaseOrder"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PurchaseOrder"
  /api/products:
    get:
      tags:
        - product-controller
      operationId: getProducts
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
  /api/orders/{id}:
    get:
      tags:
        - purchase-order-controller
      summary: Get Order by id
      description: This endpoint gets all orders by provided id
      operationId: getOrderById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"
        "400":
          description: Bad request - Invalid id provided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"
  /api/orders/hi:
    get:
      tags:
        - purchase-order-controller
      summary: Greet a user
      description: This endpoint greets the user
      operationId: hello
      responses:
        "200":
          description: Successful greeting
          content:
            '*/*':
              schema:
                type: string
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                type: string
components:
  schemas:
    OrderedItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        purchaseOrder:
          $ref: "#/components/schemas/PurchaseOrder"
        product:
          $ref: "#/components/schemas/Product"
        quantity:
          type: integer
          format: int32
    Product:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        price:
          type: number
    PurchaseOrder:
      type: object
      properties:
        id:
          type: integer
          format: int64
        orderedAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderedItem"
